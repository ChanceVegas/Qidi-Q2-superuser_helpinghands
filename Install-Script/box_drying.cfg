# =====================================================================
# box_drying.cfg
# ---------------------------------------------------------------------
# Integrates the Qidi Box with Happy Hare's built-in Environment
# Manager for filament drying on a Qidi Q2 running BunnyBox.
#
# HARDWARE (already configured in mmu_hardware.cfg):
#   filament_heater:    heater_generic box1_heater
#   environment_sensor: temperature_sensor box1_env   (AHT2X - temp + humidity)
#
# REQUIRED mmu_parameters.cfg CHANGES (make these manually):
#   heater_vent_macro:    _QIDI_BOX_VENT   # points to our rotation macro below
#   heater_vent_interval: 5                # call it every 5 minutes during drying
#
# HOW IT WORKS:
#   Happy Hare's MMU_HEATER command manages the full drying lifecycle:
#     - Heater temperature control
#     - Countdown timer with optional early-termination on humidity goal
#     - Periodic calls to _QIDI_BOX_VENT (every heater_vent_interval minutes)
#   _QIDI_BOX_VENT uses FORCE_MOVE to rotate each gear stepper, which
#   pulls filament slightly off each spool, rotating it to expose fresh
#   surface to the heated air. Direction alternates each call so net
#   filament position stays near zero over a long drying cycle.
#
# COMMANDS:
#   BOX_DRY [TEMP=45] [TIME=300] [HUMIDITY=15]
#       Start a managed drying cycle. Defaults: 45°C, 300 min, 15% RH.
#       Temperature and time are auto-selected from drying_data in
#       mmu_parameters.cfg if filament types are set in the gate map.
#
#   BOX_DRY_STOP
#       Stop drying and turn off the heater immediately.
#
#   MMU_HEATER
#       Show current drying status (temp, humidity, time remaining, etc.)
#       This is Happy Hare's native command; BOX_DRY wraps it.
#
#   BOX_ROTATE_SPOOLS
#       Rotate all spools once manually (calls _QIDI_BOX_VENT directly).
#
# TUNING:
#   Edit _QIDI_BOX_VENT_VARS below. Rotation defaults match the
#   Happy Hare recommendation of 60–90 degrees per call.
#
# NOTE ON SPOOL ROTATION:
#   Rotation works by moving the filament-feed gear stepper, which
#   pulls filament off the spool causing it to rotate. Filament must
#   be loaded into the gate (end inside the BMG gear) for rotation
#   to actually move the spool. An unloaded gate will spin the gear
#   harmlessly with no spool effect.
# =====================================================================

# ---------------------------------------------------------------------
# Rotation tuning variables
# ---------------------------------------------------------------------
[gcode_macro _QIDI_BOX_VENT_VARS]
variable_rotate_degrees:  75    # Gear stepper degrees per rotation call (60–90 recommended)
variable_rotate_speed:    25    # FORCE_MOVE velocity in mm/s of filament travel
variable_rotate_accel:   100    # FORCE_MOVE acceleration
variable_steppers: "stepper_mmu_gear, stepper_mmu_gear_1, stepper_mmu_gear_2, stepper_mmu_gear_3"
gcode:
    # Variable holder only

# State: tracks which direction to rotate next (alternates to keep net travel near zero)
[gcode_macro _QIDI_BOX_VENT_STATE]
variable_direction: 1
gcode:
    # State holder only

# ---------------------------------------------------------------------
# _QIDI_BOX_VENT
# Called by Happy Hare every heater_vent_interval minutes during a
# drying cycle. Set heater_vent_macro: _QIDI_BOX_VENT in
# mmu_parameters.cfg, and heater_vent_interval: 5.
#
# The GATES parameter is passed by Happy Hare in per-gate mode but
# ignored here since the Qidi Box uses single-heater mode and all
# four gear steppers are always rotated together.
# ---------------------------------------------------------------------
[gcode_macro _QIDI_BOX_VENT]
description: Called by Happy Hare during drying - rotates all Qidi Box spools
gcode:
    {% set vars  = printer['gcode_macro _QIDI_BOX_VENT_VARS'] %}
    {% set state = printer['gcode_macro _QIDI_BOX_VENT_STATE'] %}
    {% set sign  = state.direction|int %}
    {% set deg   = vars.rotate_degrees|float %}
    {% set spd   = vars.rotate_speed|float %}
    {% set acc   = vars.rotate_accel|float %}

    # Guard: skip during active prints or MMU operations
    {% if printer.print_stats.state in ['printing', 'paused'] %}
        MMU_LOG MSG="Qidi Box: skipping spool rotation - print is active"
    {% elif printer.mmu is defined and printer.mmu.action != 'Idle' %}
        MMU_LOG MSG="Qidi Box: skipping spool rotation - MMU is {printer.mmu.action}"
    {% else %}
        MMU_LOG MSG="Qidi Box: rotating spools {deg}° ({'forward' if sign > 0 else 'reverse'})"
        {% for stepper in vars.steppers.split(',') %}
            {% set s = stepper|trim %}
            {% set rd = printer.configfile.settings[s].rotation_distance|float %}
            {% set mm = sign * rd * deg / 360.0 %}
            FORCE_MOVE STEPPER={s} DISTANCE={mm} VELOCITY={spd} ACCEL={acc}
        {% endfor %}
        # Flip direction for next call so net filament travel cancels over time
        SET_GCODE_VARIABLE MACRO=_QIDI_BOX_VENT_STATE VARIABLE=direction VALUE={sign * -1}
    {% endif %}

# ---------------------------------------------------------------------
# Public commands
# ---------------------------------------------------------------------

[gcode_macro BOX_DRY]
description: Start a managed filament drying cycle using Happy Hare's Environment Manager
gcode:
    {% set temp     = params.TEMP|default(0)|int %}
    {% set time_min = params.TIME|default(0)|int %}
    {% set humidity = params.HUMIDITY|default(15)|int %}

    {% if temp > 0 and time_min > 0 %}
        MMU_HEATER DRY=1 TEMP={temp} TIMER={time_min} HUMIDITY={humidity}
    {% elif temp > 0 %}
        MMU_HEATER DRY=1 TEMP={temp} HUMIDITY={humidity}
    {% elif time_min > 0 %}
        MMU_HEATER DRY=1 TIMER={time_min} HUMIDITY={humidity}
    {% else %}
        # No overrides - let Happy Hare pick temp/time from gate filament types
        MMU_HEATER DRY=1 HUMIDITY={humidity}
    {% endif %}

[gcode_macro BOX_DRY_STOP]
description: Stop filament drying and turn off the box heater
gcode:
    MMU_HEATER STOP=1

[gcode_macro BOX_ROTATE_SPOOLS]
description: Manually rotate all Qidi Box spools once (one vent-macro tick)
gcode:
    _QIDI_BOX_VENT
