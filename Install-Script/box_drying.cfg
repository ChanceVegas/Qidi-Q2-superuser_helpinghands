# =====================================================================
# box_drying.cfg  —  Qidi Box spool rotation during filament drying
# =====================================================================
# Integrates with Happy Hare's built-in Environment Manager so the
# Qidi Q2 can use its Box heater and gear steppers for filament drying.
#
# PREREQUISITES (already done by BunnyBox installer + our install script):
#   mmu_hardware.cfg:
#     filament_heater:    heater_generic box1_heater
#     environment_sensor: temperature_sensor box1_env
#   mmu_parameters.cfg (patched by install script):
#     heater_vent_macro:    _QIDI_BOX_VENT
#     heater_vent_interval: 5
#
# HOW IT WORKS:
#   Happy Hare's MMU_HEATER manages the full drying lifecycle (heater,
#   timer, humidity goal). Every heater_vent_interval minutes it calls
#   _QIDI_BOX_VENT, which uses FORCE_MOVE on each gear stepper to
#   rotate the spools. Direction alternates each call so net filament
#   position stays near zero over a long drying cycle.
#
# USER COMMANDS:
#   BOX_DRY [TEMP=45] [TIME=300] [HUMIDITY=25]   Start drying
#   BOX_DRY_STOP                                  Stop drying
#   BOX_DRY_STATUS                                Show drying status
#   BOX_ROTATE_SPOOLS                             Manual one-shot rotation
#
# TUNING:
#   Edit _QIDI_BOX_VENT_VARS below. Defaults: 75° every 5 min.
# =====================================================================


# ----- Tuning variables ----------------------------------------------
[gcode_macro _QIDI_BOX_VENT_VARS]
variable_rotate_degrees: 75     # Gear stepper degrees per call (60-90 recommended)
variable_rotate_speed:   25     # FORCE_MOVE velocity (mm/s filament travel)
variable_rotate_accel:  100     # FORCE_MOVE acceleration
variable_steppers: "stepper_mmu_gear, stepper_mmu_gear_1, stepper_mmu_gear_2, stepper_mmu_gear_3"
gcode:
    # Variable holder — no body


# ----- Direction state (alternates each call) ------------------------
[gcode_macro _QIDI_BOX_VENT_STATE]
variable_direction: 1
gcode:
    # State holder — no body


# ----- Vent callback (called by Happy Hare during drying) ------------
# Set heater_vent_macro: _QIDI_BOX_VENT in mmu_parameters.cfg.
# Happy Hare passes GATES= in per-gate mode; ignored here because
# the Qidi Box is single-heater mode — all four steppers rotate.
[gcode_macro _QIDI_BOX_VENT]
description: Happy Hare drying callback — rotates all Qidi Box spools
gcode:
    {% set vars  = printer['gcode_macro _QIDI_BOX_VENT_VARS'] %}
    {% set state = printer['gcode_macro _QIDI_BOX_VENT_STATE'] %}
    {% set sign  = state.direction|int %}
    {% set deg   = vars.rotate_degrees|float %}
    {% set spd   = vars.rotate_speed|float %}
    {% set acc   = vars.rotate_accel|float %}

    # Guard: never rotate during a print or active MMU operation
    {% if printer.print_stats.state in ['printing', 'paused'] %}
        MMU_LOG MSG="Qidi Box: skipping rotation (print is {printer.print_stats.state})"
    {% elif printer.mmu is defined and printer.mmu.action != 'Idle' %}
        MMU_LOG MSG="Qidi Box: skipping rotation (MMU is {printer.mmu.action})"
    {% else %}
        {% set dir_label = 'forward' if sign > 0 else 'reverse' %}
        MMU_LOG MSG="Qidi Box: rotating spools {deg}deg {dir_label}"
        {% for stepper in vars.steppers.split(',') %}
            {% set s = stepper|trim %}
            # Only move steppers that actually exist in the config
            {% if s in printer.configfile.settings %}
                {% set rd = printer.configfile.settings[s].rotation_distance|float %}
                {% set mm = sign * rd * deg / 360.0 %}
                FORCE_MOVE STEPPER={s} DISTANCE={mm} VELOCITY={spd} ACCEL={acc}
            {% endif %}
        {% endfor %}
        # Flip direction so net filament travel cancels over time
        SET_GCODE_VARIABLE MACRO=_QIDI_BOX_VENT_STATE VARIABLE=direction VALUE={sign * -1}
    {% endif %}


# ----- Public commands -----------------------------------------------

[gcode_macro BOX_DRY]
description: Start a managed filament drying cycle via Happy Hare
gcode:
    {% set temp     = params.TEMP|default(0)|int %}
    {% set time_min = params.TIME|default(0)|int %}
    {% set humidity = params.HUMIDITY|default(25)|int %}

    {% if temp > 0 and time_min > 0 %}
        MMU_HEATER DRY=1 TEMP={temp} TIMER={time_min} HUMIDITY={humidity}
    {% elif temp > 0 %}
        MMU_HEATER DRY=1 TEMP={temp} HUMIDITY={humidity}
    {% elif time_min > 0 %}
        MMU_HEATER DRY=1 TIMER={time_min} HUMIDITY={humidity}
    {% else %}
        MMU_HEATER DRY=1 HUMIDITY={humidity}
    {% endif %}

[gcode_macro BOX_DRY_STOP]
description: Stop filament drying and turn off the box heater
gcode:
    MMU_HEATER STOP=1

[gcode_macro BOX_DRY_STATUS]
description: Show current drying cycle status
gcode:
    MMU_HEATER

[gcode_macro BOX_ROTATE_SPOOLS]
description: Manually rotate all Qidi Box spools once
gcode:
    _QIDI_BOX_VENT


# ----- Filament-type presets (Qidi + Bambu Lab recommended settings) --
# Source: wiki.qidi3d.com/en/QIDIBOX/filament-drying
#         wiki.bambulab.com/en/filament-acc/filament/dry-filament

[gcode_macro DRY_PLA]
description: Dry PLA — 45C / 4h (Qidi + Bambu recommended)
gcode:
    BOX_DRY TEMP=45 TIME=240

[gcode_macro DRY_PETG]
description: Dry PETG — 65C / 4h (Qidi recommended)
gcode:
    BOX_DRY TEMP=65 TIME=240

[gcode_macro DRY_ABS]
description: Dry ABS/ASA — 65C / 4h (Bambu recommended)
gcode:
    BOX_DRY TEMP=65 TIME=240

[gcode_macro DRY_TPU]
description: Dry TPU/TPE — 55C / 4h (Bambu max to avoid deformation)
gcode:
    BOX_DRY TEMP=55 TIME=240

[gcode_macro DRY_PA]
description: Dry PA/Nylon — 70C / 8h (Qidi + Bambu recommended)
gcode:
    BOX_DRY TEMP=70 TIME=480
