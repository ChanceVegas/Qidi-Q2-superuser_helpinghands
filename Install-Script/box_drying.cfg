# =====================================================================
# box_drying.cfg
# ---------------------------------------------------------------------
# Restores Qidi Box spool rotation during filament drying for installs
# that use BunnyBox / Happy Hare MMU on a Qidi Q2.
#
# THE PROBLEM
#   Stock Qidi has [box_extras] (a compiled C/Python Klipper module) and
#   [box_stepper slotN] sections that together rotate spools periodically
#   while the box heater is on. The Happy Hare installer removes
#   [include box.cfg] (to avoid T-macro collisions) and replaces the
#   hardware with standard [stepper_mmu_gear*], [heater_generic
#   box1_heater] and [heater_fan box1_heater_fan_*] sections. There is
#   no longer anything driving the spool rotation, so wet filament
#   doesn't dry evenly.
#
# THE FIX
#   Detect when box1_heater is heating (target > MIN_ACTIVE_TEMP) and
#   periodically rotate each gear stepper by a small amount using
#   FORCE_MOVE. Direction alternates each tick so the gear's net
#   filament position drifts only minimally over a multi-hour cycle.
#
# REQUIREMENTS
#   * [force_move] enable_force_move: True   (already present in stock
#                                              printer.cfg and the
#                                              BunnyBox replacement)
#   * Happy Hare's [stepper_mmu_gear], [stepper_mmu_gear_1..3]
#     (defined in mmu_hardware.cfg)
#   * [heater_generic box1_heater]
#     (defined in mmu_hardware.cfg)
#
# SAFETY GUARDS
#   * Will NOT rotate while printing
#   * Will NOT rotate while Happy Hare's action is anything other than
#     "Idle" (avoids stomping on an active tool change / loading)
#   * Will NOT rotate while MMU has filament in any non-idle position
#     for the currently selected gate
#   * Direction alternates per tick so net filament travel stays small
#
# TUNING
#   Edit the variables in [gcode_macro _BOX_DRY_VARS]. Defaults match
#   the Happy Hare recommendation (60-90 degrees / 5 minutes).
#
# MANUAL COMMANDS
#   BOX_ROTATE_SPOOLS                Rotate all spools once, now
#   BOX_DRY TEMP=45 TIME=300         Start drying (TEMP in C, TIME in min)
#   BOX_DRY_STOP                     Stop drying immediately
#
# =====================================================================

# ---------------------------------------------------------------------
# Tuning variables. Edit these values to taste; do not put gcode here.
# ---------------------------------------------------------------------
[gcode_macro _BOX_DRY_VARS]
variable_rotate_degrees: 75           # Degrees of stepper rotation per tick (60-90 recommended)
variable_rotate_interval_s: 300       # Seconds between rotation pulses (300 = 5 min)
variable_rotate_speed_mm_s: 25        # FORCE_MOVE velocity (mm/s of filament travel)
variable_rotate_accel: 100            # FORCE_MOVE acceleration
variable_min_active_temp: 30          # Heater target >= this is "drying active" (C)
variable_watch_interval_s: 10         # How often to poll heater state (seconds)
variable_steppers: "stepper_mmu_gear, stepper_mmu_gear_1, stepper_mmu_gear_2, stepper_mmu_gear_3"
gcode:
    # Variable holder only. No body.

# ---------------------------------------------------------------------
# State tracker for the drying-active watch loop. Holds:
#   running:   1 while we have a tick scheduled, else 0
#   direction: +1 / -1, flipped each tick so net travel stays small
# ---------------------------------------------------------------------
[gcode_macro _BOX_DRY_STATE]
variable_running: 0
variable_direction: 1
gcode:
    # State holder only. No body.

# ---------------------------------------------------------------------
# Rotate one stepper. Reads rotation_distance from config to convert
# degrees -> mm of filament travel for FORCE_MOVE.
# ---------------------------------------------------------------------
[gcode_macro _BOX_ROTATE_ONE]
gcode:
    {% set stepper = params.STEPPER|string %}
    {% set sign = params.SIGN|default(1)|int %}
    {% set vars = printer['gcode_macro _BOX_DRY_VARS'] %}
    {% set degrees = vars.rotate_degrees|float %}
    {% set speed = vars.rotate_speed_mm_s|float %}
    {% set accel = vars.rotate_accel|float %}

    # rotation_distance is the linear mm of filament per full stepper rev.
    # On stepper_mmu_gear that's ~13.6 mm/rev for the Qidi Box BMG gear.
    {% set rd = printer.configfile.settings[stepper].rotation_distance|float %}
    {% set mm = sign * rd * degrees / 360.0 %}

    FORCE_MOVE STEPPER={stepper} DISTANCE={mm} VELOCITY={speed} ACCEL={accel}

# ---------------------------------------------------------------------
# Public command: rotate every gear stepper once, using the current
# alternating direction from _BOX_DRY_STATE. Safe to call manually.
# ---------------------------------------------------------------------
[gcode_macro BOX_ROTATE_SPOOLS]
description: Rotate every MMU spool by the configured angle (one tick)
gcode:
    {% set vars = printer['gcode_macro _BOX_DRY_VARS'] %}
    {% set state = printer['gcode_macro _BOX_DRY_STATE'] %}
    {% set sign = state.direction|int %}

    # Refuse if a print is active
    {% if printer.print_stats.state in ['printing', 'paused'] %}
        RESPOND TYPE=command MSG="BOX_ROTATE_SPOOLS skipped: a print is {printer.print_stats.state}"
    # Refuse if Happy Hare is doing anything other than sitting idle
    {% elif printer.mmu is defined and printer.mmu.action != 'Idle' %}
        RESPOND TYPE=command MSG="BOX_ROTATE_SPOOLS skipped: MMU action is '{printer.mmu.action}'"
    {% else %}
        {% for stepper in vars.steppers.split(',') %}
            _BOX_ROTATE_ONE STEPPER={stepper|trim} SIGN={sign}
        {% endfor %}
        # Flip direction so net filament travel cancels over pairs of ticks
        SET_GCODE_VARIABLE MACRO=_BOX_DRY_STATE VARIABLE=direction VALUE={sign * -1}
    {% endif %}

# ---------------------------------------------------------------------
# Periodic tick. Reschedules itself while drying is active; stops when
# the heater target drops below the active threshold.
# ---------------------------------------------------------------------
[delayed_gcode _BOX_DRY_TICK]
gcode:
    {% set vars = printer['gcode_macro _BOX_DRY_VARS'] %}
    {% set heater = printer['heater_generic box1_heater'] %}
    {% if heater.target|float >= vars.min_active_temp|float %}
        BOX_ROTATE_SPOOLS
        UPDATE_DELAYED_GCODE ID=_BOX_DRY_TICK DURATION={vars.rotate_interval_s}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_BOX_DRY_STATE VARIABLE=running VALUE=0
        RESPOND TYPE=command MSG="Box drying inactive; spool rotation stopped."
    {% endif %}

# ---------------------------------------------------------------------
# Watch loop. Polls the heater target every WATCH_INTERVAL_S seconds.
# When it crosses above MIN_ACTIVE_TEMP, kicks off the tick.
# Kicked off once on Klipper ready, then self-reschedules forever.
# Cheap: just a few jinja lookups per poll.
# ---------------------------------------------------------------------
[delayed_gcode _BOX_DRY_WATCH]
initial_duration: 30
gcode:
    {% set vars = printer['gcode_macro _BOX_DRY_VARS'] %}
    {% set state = printer['gcode_macro _BOX_DRY_STATE'] %}
    {% set heater = printer['heater_generic box1_heater'] %}
    {% set active = heater.target|float >= vars.min_active_temp|float %}

    {% if active and state.running|int == 0 %}
        # Drying just started
        SET_GCODE_VARIABLE MACRO=_BOX_DRY_STATE VARIABLE=running VALUE=1
        RESPOND TYPE=command MSG="Box drying detected (target {heater.target|round(0)}C). Rotating spools every {(vars.rotate_interval_s|float/60)|round(1)} min."
        UPDATE_DELAYED_GCODE ID=_BOX_DRY_TICK DURATION={vars.rotate_interval_s}
    {% elif not active and state.running|int == 1 %}
        # Drying just stopped
        SET_GCODE_VARIABLE MACRO=_BOX_DRY_STATE VARIABLE=running VALUE=0
        UPDATE_DELAYED_GCODE ID=_BOX_DRY_TICK DURATION=0
        RESPOND TYPE=command MSG="Box drying ended; spool rotation disabled."
    {% endif %}

    UPDATE_DELAYED_GCODE ID=_BOX_DRY_WATCH DURATION={vars.watch_interval_s}

# ---------------------------------------------------------------------
# Convenience: one-shot drying without HelixScreen / MMU_HEATER.
# Sets the box heater and schedules an auto-stop.
# Usage: BOX_DRY                    -> 45 C for 300 minutes (defaults)
#        BOX_DRY TEMP=55            -> 55 C for 300 minutes
#        BOX_DRY TEMP=70 TIME=720   -> 70 C for 12 hours
# ---------------------------------------------------------------------
[gcode_macro BOX_DRY]
description: Start filament drying. Usage: BOX_DRY TEMP=45 TIME=300
gcode:
    {% set temp = params.TEMP|default(45)|int %}
    {% set time_min = params.TIME|default(300)|int %}
    SET_HEATER_TEMPERATURE HEATER=box1_heater TARGET={temp}
    RESPOND TYPE=command MSG="Box drying: {temp}C for {time_min} min. Use BOX_DRY_STOP to cancel."
    UPDATE_DELAYED_GCODE ID=_BOX_DRY_AUTO_STOP DURATION={time_min * 60}

[gcode_macro BOX_DRY_STOP]
description: Stop filament drying immediately
gcode:
    SET_HEATER_TEMPERATURE HEATER=box1_heater TARGET=0
    UPDATE_DELAYED_GCODE ID=_BOX_DRY_AUTO_STOP DURATION=0
    RESPOND TYPE=command MSG="Box drying stopped."

[delayed_gcode _BOX_DRY_AUTO_STOP]
gcode:
    BOX_DRY_STOP
