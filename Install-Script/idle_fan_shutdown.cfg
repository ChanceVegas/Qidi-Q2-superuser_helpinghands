# idle_fan_shutdown.cfg
# ----------------------------------------------------------------------
# Powers down all fans and heaters after 10 minutes of idle, UNLESS any
# temperature sensor is still reporting an unsafe value. Re-checks every
# 60 seconds while temps are unsafe, so the printer only goes quiet when
# it is genuinely safe to do so.
#
# Installed by the Qidi Q2 Superuser AIO (both install paths).
# ----------------------------------------------------------------------

[idle_timeout]
timeout: 600
gcode:
    _IDLE_SHUTDOWN

[gcode_macro _IDLE_SHUTDOWN]
description: Spool down all fans + heaters after idle, unless temps unsafe.
# Threshold below which a heater/sensor is considered "safe to power
# down". Override these from the slicer or another macro if needed.
variable_safe_extruder: 50
variable_safe_bed: 40
variable_safe_chamber: 40
gcode:
    {% set ext = printer.extruder.temperature|default(0)|float %}
    {% set bed = printer.heater_bed.temperature|default(0)|float %}
    {% set chamber = (printer["temperature_sensor chamber"].temperature
                      if "temperature_sensor chamber" in printer
                      else 0)|float %}

    {% set unsafe = ext  >= safe_extruder
                 or bed  >= safe_bed
                 or chamber >= safe_chamber %}

    {% if unsafe %}
        RESPOND TYPE=echo MSG="Idle 10m, but temps still unsafe (ext={ext} bed={bed} chamber={chamber}). Re-checking in 60s."
        UPDATE_DELAYED_GCODE ID=_RECHECK_IDLE_FANS DURATION=60
    {% else %}
        RESPOND TYPE=echo MSG="Idle 10m and temps safe (ext={ext} bed={bed} chamber={chamber}). Powering down."
        TURN_OFF_HEATERS
        M107                 ; part cooling fan off
        M141 S0              ; chamber heater off (Qidi)
        DISABLE_BOX_HEATER   ; box heater off (Qidi Box, if present)
        # Controller_fan blocks (chamber_fan, board_fan, etc) spool down
        # on their own once their associated heater/stepper triggers go
        # cold - TURN_OFF_HEATERS + M84 below is what they're watching.
        M84                  ; disable motors
    {% endif %}

[delayed_gcode _RECHECK_IDLE_FANS]
initial_duration: 0
gcode:
    _IDLE_SHUTDOWN
